repos:
-   repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.39.0
    hooks:
    -   id: markdownlint
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
    -   id: check-yaml
    -   id: end-of-file-fixer
    -   id: trailing-whitespace
-   repo: https://github.com/prettier/pre-commit
    rev: v6.0.0
    hooks:
    -   id: prettier
        types_or: [javascript, jsx, typescript, tsx, json, css, scss, html, yaml, markdown]
-   repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
    -   id: go-fmt
    -   id: go-vet
    -   id: go-lint
    -   id: go-imports
    -   id: go-cyclo
        args: [-over=15]
    -   id: validate-toml
    -   id: no-go-testing
    -   id: golangci-lint
    -   id: go-critic
    -   id: go-unit-tests
    -   id: go-build
    -   id: go-mod-tidy
-   repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.92.0
    hooks:
    -   id: terraform_fmt
    -   id: terraform_validate
-   repo: https://github.com/postmodern/pre-commit-flutter
    rev: v0.0.3
    hooks:
    -   id: flutter-format